<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work | Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="img/logo-icon.svg" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/work.css" />
  </head>
  <body>
    <div class="loader hidden">
      <div class="loader-bar"></div>
    </div>
    <header>
      <div class="container">
        <a href="index.html" class="logo">
          <img class="logo-icon" src="img/logo-icon.svg" alt="" />
          Your Name
        </a>
        <nav>
          <a href="index.html">Home</a>
          <a href="work.html" class="active">Work</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>
    <div id="page">

      <!-- Main content -->
      <main id="content">
        <!-- Work Hero -->
        <section class="work-hero" data-observe>
          <img
            class="work-image-bg"
            src="img/work-page/carolin-thiergart.jpg"
            alt=""
          />
          <div class="container">
            <h1>Work</h1>
            <p class="work-tagline">
              Frontend Developer &middot; Building for the Web
            </p>
            <p class="work-subtitle">
              A showcase of projects I've built and contributed to.
            </p>
          </div>
        </section>

        <!-- Projects -->
        <section id="projects" data-observe>
          <div class="container">
            <span class="section-kicker">Selected Work</span>
            <h2 class="section-title">Projects</h2>
            <div class="projects-wrapper">
              <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="web">Web</button>
                <button class="filter-btn" data-filter="cpp">C++</button>
                <button class="filter-btn" data-filter="design">Design</button>
              </div>
              <div class="projects-grid" id="projects-grid"></div>
            </div>
          </div>
        </section>
      </main>

      <!-- Footer -->
      <footer class="on-orange" data-observe>
        <div class="container">
          <div class="footer-copy">&copy; 2026 Your Name. All rights reserved.</div>
        </div>
      </footer>
    </div>
    <script src="java-script/main.js"></script>
    <script src="java-script/work.js"></script>
  </body>
</html>
