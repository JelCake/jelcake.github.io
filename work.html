<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work | Portfolio</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/work.css" />
  </head>
  <body>
    <div class="page-transition"></div>
    <div id="page">
      <!-- Header -->
      <header>
        <div class="container">
          <div class="left-group">
            <div class="profile-pic"></div>
            <a href="index.html" class="logo"
              ><strong>Your</strong> <em>Name</em></a
            >
          </div>
          <nav>
            <a href="index.html">Home</a>
            <a href="work.html" class="active">Work</a>
            <a href="about.html">About Me</a>
            <a href="contact.html">Contact Me</a>
          </nav>
        </div>
      </header>

      <!-- Main content -->
      <main id="content">
        <!-- Work Hero -->
        <section class="work-hero" data-observe>
          <img
            class="work-image-bg"
            src="img/work-page/carolin-thiergart.jpg"
            alt=""
          />
          <div class="container">
            <h1>Work</h1>
            <p class="work-tagline">
              Frontend Developer &middot; Building for the Web
            </p>
            <p class="work-subtitle">
              A showcase of projects I've built and contributed to.
            </p>
          </div>
        </section>

        <!-- Projects -->
        <section id="projects" data-observe>
          <div class="container">
            <span class="section-kicker">Selected Work</span>
            <h2 class="section-title">Projects</h2>
            <div class="projects-wrapper">
              <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="web">Web</button>
                <button class="filter-btn" data-filter="cpp">C++</button>
                <button class="filter-btn" data-filter="design">Design</button>
              </div>
              <div class="projects-grid" id="projects-grid"></div>
            </div>
          </div>
        </section>
      </main>

      <!-- Footer -->
      <footer class="on-orange" data-observe>
        <div class="container">
          <div class="footer-row">
            <div class="footer-center">
              <div class="footer-logo-placeholder">L</div>
            </div>
            <div class="footer-right">
              <a href="https://github.com/" target="_blank" class="social-link" title="GitHub">GH</a>
              <a href="https://linkedin.com/in/" target="_blank" class="social-link" title="LinkedIn">LI</a>
              <a href="https://wa.me/" target="_blank" class="social-link" title="WhatsApp">WA</a>
              <a href="mailto:you@example.com" target="_blank" class="social-link" title="Email">ML</a>
            </div>
          </div>
          <div class="footer-copy">&copy; 2026 Your Name. All rights reserved.</div>
        </div>
      </footer>
    </div>
    <script src="java-script/main.js"></script>
    <script src="java-script/work.js"></script>
  </body>
</html>
