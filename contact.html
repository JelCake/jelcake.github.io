<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Portfolio</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div id="page">
      <!-- Header -->
      <header>
        <div class="container">
          <a href="index.html" class="logo"><strong>Your</strong> <em>Name</em></a>
          <nav>
            <a href="index.html">Home</a>
            <a href="work.html">Work</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
          </nav>
        </div>
      </header>

      <!-- Main content -->
      <main id="content">
        <!-- Contact info -->
        <section>
          <div class="container">
            <h2>Contact</h2>
            <p class="page-intro">Let's connect. Reach out or find me on social media.</p>
            <div class="contact-info">
              <div class="contact-item">
                <div class="contact-icon"></div>
                <a href="mailto:hello@example.com">hello@example.com</a>
              </div>
              <div class="contact-item">
                <div class="contact-icon"></div>
                <span>+1 (555) 123-4567</span>
              </div>
              <div class="contact-item">
                <div class="contact-icon"></div>
                <a href="https://github.com/yourusername" target="_blank" rel="noopener">GitHub</a>
              </div>
              <div class="contact-item">
                <div class="contact-icon"></div>
                <a href="https://linkedin.com/in/yourusername" target="_blank" rel="noopener">LinkedIn</a>
              </div>
              <div class="contact-item">
                <div class="contact-icon"></div>
                <a href="https://twitter.com/yourusername" target="_blank" rel="noopener">Twitter</a>
              </div>
            </div>
          </div>
        </section>

        <!-- Contact form -->
        <section>
          <div class="container">
            <div class="contact-form">
              <h3>Send a Message</h3>
              <form id="contact-form">
                <div class="form-group">
                  <label for="name">Name</label>
                  <input type="text" id="name" name="name" required />
                </div>
                <div class="form-group">
                  <label for="email">Email</label>
                  <input type="email" id="email" name="email" required />
                </div>
                <div class="form-group">
                  <label for="message">Message</label>
                  <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="btn">Send</button>
              </form>
            </div>
          </div>
        </section>
      </main>

      <!-- Footer -->
      <footer>
        <div class="container">
          <p>&copy; 2026 Your Name. All rights reserved.</p>
        </div>
      </footer>
    </div>
    <script src="javaScript/main.js"></script>
    <script src="javaScript/contact.js"></script>
  </body>
</html>
